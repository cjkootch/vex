name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: install → typecheck → lint → test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Unit test
        run: pnpm -r run test

  # GitHub Actions disallows `secrets` in job-level `if:`, so a step
  # translates the secret's presence into an output the eval job can gate on.
  check-eval-secrets:
    name: Detect eval secrets
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          NEON_DEV_URL: ${{ secrets.NEON_DEV_URL }}
        run: |
          if [ -n "$NEON_DEV_URL" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  eval:
    name: Run eval suite
    needs: [ci, check-eval-secrets]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Sprint 4 — blocking eval gate. Skips when secrets aren't configured
    # (forks, dependabot) so we don't fail PRs that can't access them.
    if: needs.check-eval-secrets.outputs.available == 'true'
    env:
      APPLICATION_DATABASE_URL: ${{ secrets.NEON_DEV_URL }}
      MIGRATION_DATABASE_URL: ${{ secrets.NEON_DEV_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REDIS_URL: redis://localhost:6379
      S3_BUCKET: vex-eval
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run eval suite
        run: pnpm eval:run
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/latest.json
          if-no-files-found: ignore
