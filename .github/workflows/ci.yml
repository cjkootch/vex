name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: install → typecheck → lint → test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Unit test
        run: pnpm -r run test

  # Preflight is the workaround for GitHub Actions refusing
  # `secrets.*` in job-level `if:` expressions. The preflight job
  # reads the needed secrets into step env and emits plain boolean
  # outputs; downstream jobs gate on `needs.preflight.outputs.*`.
  preflight:
    name: preflight-secrets
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      has_eval_secrets: ${{ steps.check.outputs.has_eval_secrets }}
    steps:
      - id: check
        env:
          NEON_DEV_URL: ${{ secrets.NEON_DEV_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${NEON_DEV_URL:-}" ] \
             && [ -n "${ANTHROPIC_API_KEY:-}" ] \
             && [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "has_eval_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_eval_secrets=false" >> "$GITHUB_OUTPUT"
          fi

  eval:
    name: Run eval suite (gate 85%)
    needs: [ci, preflight]
    if: ${{ needs.preflight.outputs.has_eval_secrets == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APPLICATION_DATABASE_URL: ${{ secrets.NEON_DEV_URL }}
      MIGRATION_DATABASE_URL: ${{ secrets.NEON_DEV_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REDIS_URL: redis://localhost:6379
      S3_BUCKET: vex-eval
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      # The eval runner imports compiled package output (@vex/config
      # points at dist/index.js, etc). On a fresh CI install dist/ is
      # missing, which ends the suite with ERR_MODULE_NOT_FOUND before
      # a single fixture runs. Build the workspace packages first so
      # the runner resolves its own imports.
      - name: Build workspace packages
        run: pnpm -r --filter="./packages/*" run build
      # NEON_DEV_URL is a long-lived Neon branch shared across CI
      # runs. New migrations (e.g. Sprint 11's fuel_deals) only land
      # here if we explicitly apply them. Without this step, the
      # eval suite fails ~80% of fixtures with
      # `relation "fuel_deals" does not exist`. drizzle-kit's migrate
      # is idempotent (checks the ledger) so re-running is cheap.
      - name: Apply migrations to dev branch
        env:
          MIGRATION_DATABASE_URL: ${{ secrets.NEON_DEV_URL }}
        run: pnpm --filter @vex/db run migrate
      # The eval fixtures reference the seeded tenant's record ids
      # (SEED_FUEL_DEAL_IDS, SEED_ORG_IDS, etc). Migrations alone
      # leave the DB with only schema — expected_evidence_object_ids
      # then all miss with `evidence 0/N`. The seed script wipes and
      # re-inserts every row matching `id LIKE '01HSEED%'` so it is
      # effectively idempotent and safe to re-run on every push.
      - name: Seed demo tenant on dev branch
        env:
          MIGRATION_DATABASE_URL: ${{ secrets.NEON_DEV_URL }}
        run: pnpm --filter @vex/db run seed
      # Runner enforces the 85% gate + fails on any regression vs
      # evals/results/latest.json. See packages/agents/src/evals/runner.ts.
      - name: Run eval suite
        run: pnpm eval:run
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/latest.json
          if-no-files-found: ignore
