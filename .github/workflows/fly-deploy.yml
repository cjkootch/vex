name: Fly deploy (apps/api)

# Auto-deploys apps/api to Fly.io on every push to main. Keeps the API
# in lock-step with apps/web (Vercel) so the web can't ship UI that
# expects endpoints the live API doesn't have yet.
#
# Requires FLY_API_TOKEN in repo secrets. Without the token the
# preflight skips the deploy so forks / branch CI keep working.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "fly.toml"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  preflight:
    name: preflight-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${FLY_API_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: fly-deploy-api
    needs: preflight
    if: ${{ needs.preflight.outputs.has_token == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config fly.toml
