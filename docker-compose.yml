# Local dev dependencies for Vex.
#
# Per Sprint 0 scope: Redis + Localstack (S3 only). No Postgres — we rely on
# Neon serverless Postgres even for local dev (pooled + direct URLs set via
# .env).
services:
  redis:
    image: redis:7-alpine
    container_name: vex-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.5
    container_name: vex-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  localstack-data:
